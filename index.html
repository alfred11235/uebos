<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uebos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        #videoContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        video {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            opacity: 0;
            transition: opacity 0.1s;
        }
        
        video.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="videoContainer">
        <video id="video1" muted playsinline preload="auto"></video>
        <video id="video2" muted playsinline preload="auto"></video>
    </div>

    <script>
        const videos = [
            'videos/1.mp4',
            'videos/2.mp4',
            'videos/3.mp4',
            'videos/4.mp4',
            'videos/5.mp4',
            'videos/6.mp4'
        ];

        let currentVideoIndex = 0;
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        let activeVideo = video1;
        let inactiveVideo = video2;
        let nextVideoLoaded = false;

        function switchVideos() {
            [activeVideo, inactiveVideo] = [inactiveVideo, activeVideo];
        }

        function preloadNextVideo() {
            const nextIndex = (currentVideoIndex + 1) % videos.length;
            inactiveVideo.src = videos[nextIndex];
            inactiveVideo.load();
            nextVideoLoaded = true;
        }

        function playNextVideo() {
            currentVideoIndex = (currentVideoIndex + 1) % videos.length;
            
            activeVideo.classList.remove('active');
            inactiveVideo.classList.add('active');
            inactiveVideo.currentTime = 0;
            inactiveVideo.play();
            switchVideos();
            nextVideoLoaded = false;
        }

        function onTimeUpdate() {
            if (!nextVideoLoaded && this.duration - this.currentTime < 0.7) {
                preloadNextVideo();
            }
        }

        video1.addEventListener('ended', playNextVideo);
        video2.addEventListener('ended', playNextVideo);
        video1.addEventListener('timeupdate', onTimeUpdate);
        video2.addEventListener('timeupdate', onTimeUpdate);

        video1.src = videos[0];
        video1.classList.add('active');
        video1.play();
    </script>
</body>
</html>
